<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tụi mình ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(135deg, #ffd6e0, #fff0f5);
  text-align: center;
  overflow: hidden;
}

.container {
  margin-top: 60px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 25px;
  width: 320px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid pink;
}

h1 {
  color: #ff4d88;
}

#time {
  font-size: 18px;
  margin-top: 15px;
  color: #ff4d88;
}

button.music-btn {
  margin-top: 10px;
  padding: 6px 12px;
  border-radius: 12px;
  border: none;
  background: #ff4d88;
  color: white;
  cursor: pointer;
}

.heart {
  position: fixed;
  color: pink;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <img src="https://i.imgur.com/4M34hi2.png">
    <h1 id="names">Đinh Bảo Huy ❤️ Phạm Thị Kim Thảo</h1>

    <div id="time"></div>

    <button class="music-btn" onclick="toggleMusic()">🎵 Bật / Tắt nhạc</button>
  </div>
</div>

<audio id="music" loop>
  <!-- 🎵 Nhạc: Dù Cho Mai Về Sau (Acoustic) -->
  <source src="https://files.catbox.moe/evxgsj.mp3" type="audio/mpeg">
</audio>

<script>
// 🔥 đặt sẵn ngày
let startTime = new Date("2026-03-11");

function update() {
  let now = new Date();
  let diff = now - startTime;

  let days = Math.floor(diff / (1000*60*60*24));
  let hours = Math.floor((diff / (1000*60*60)) % 24);
  let minutes = Math.floor((diff / (1000*60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("time").innerHTML =
    `💖 Đã yêu nhau 💖<br><b>${days}</b> ngày<br>
     ${hours} giờ ${minutes} phút ${seconds} giây`;
}

update();
setInterval(update, 1000);

// fix autoplay + toggle
let music = document.getElementById("music");

function toggleMusic() {
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}

// click đâu cũng chạy nhạc
document.body.addEventListener("click", () => {
  if (music.paused) {
    music.play();
  }
}, { once: true });

// tim bay
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
